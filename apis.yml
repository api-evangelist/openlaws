apis:
  - aid: openlaws:openlaws
    name: OpenLaws Legal Data API
    description: >-
      The OpenLaws Legal Data API exposes statutes, regulations, constitutions,
      and case law across 53 U.S. jurisdictions through a unified data model.
      It supports keyword and BM25 / hybrid search scoped by jurisdiction,
      law type, or court; hierarchical Division retrieval over the structured
      law tree; Bluebook citation parsing, validation, and lookup; historical
      versions of Divisions with diff / redline comparison (Enterprise); and
      deep linking back to authoritative government sources for use in legal
      research, compliance workflows, and AI / RAG applications.
