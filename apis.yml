    features:
      - name: Jurisdiction Catalog
        description: List and inspect all 53 U.S. jurisdictions (federal, 50 states, D.C., Puerto Rico) with metadata and supported law types.
      - name: Laws by Jurisdiction
        description: Discover the law types available in each jurisdiction (e.g. United States Code, Code of Federal Regulations, state statutes / regulations / constitutions).
      - name: Hierarchical Division Retrieval
        description: Walk the full structured tree of any law — titles, chapters, parts, sections — by jurisdiction, law key, and OpenLaws path.
      - name: Keyword Search (Jurisdiction)
        description: Search across all laws within a jurisdiction with keyword / BM25-style retrieval, paginated, with snippet highlighting.
      - name: Keyword Search (Law)
        description: Narrow keyword search to a specific law type within a jurisdiction (e.g. only Code of Federal Regulations).
      - name: Citation Lookup
        description: Resolve a Bluebook-formatted statute, regulation, or constitution citation directly to the underlying Division.
      - name: Case Law Search
        description: Keyword search of published and unpublished case opinions scoped by jurisdiction, with optional court filters.
      - name: Case Citation Lookup
        description: Resolve a Bluebook-formatted case citation to the matching Opinion record.
      - name: Court Directory
        description: Enumerate courts within a jurisdiction and retrieve a single court's metadata.
      - name: Historical Versions and Redlines
        description: Enterprise endpoints returning Divisions created or updated after a given date, with subtree scoping, suitable for diff / redline workflows.
      - name: Unified Data Model
        description: One consistent schema for statutes, regulations, constitutions, and case law across all 53 jurisdictions.
      - name: Authoritative Source Linking
        description: Every Division and Opinion maps back to a citable government source URL for legal defensibility.
    useCases:
      - name: GRC and IRM Integration
        description: Embed regulation text into Governance, Risk, and Compliance or Integrated Risk Management workflows and questionnaires.
      - name: Citation Validation
        description: Identify, parse, and validate malformed legal citations across documents, contracts, and databases.
      - name: Legal Research
        description: Deep-link from research products into authoritative statute, regulation, and case sources.
      - name: Regulatory Change Tracking
        description: Use the Enterprise updates endpoints to monitor new and amended Divisions across a regulator's corpus.
      - name: Generative AI and RAG
        description: Feed validated, source-attributed law text into RAG, agentic workflows, and prompt grounding for legal LLM applications.
      - name: Legal NLP and ML Training
        description: Source structured law data for training and evaluating Natural Legal Language Processing models.
      - name: LegalTech and RegTech SaaS
        description: Power compliance research tools, case-law analytics, and document processing platforms with a single law API.
      - name: AI Explainability
        description: Surface original law text alongside AI-generated answers so end users can verify and cite the underlying authority.
      - name: Access-to-Justice Tooling
        description: Custom bulk-data and non-profit programs for access-to-justice and public-interest applications.
    coverage:
      - name: Federal Jurisdiction
        description: 100% coverage of federal statutes (U.S. Code) and federal regulations (Code of Federal Regulations), plus federal case opinions.
      - name: 50 U.S. States
        description: Statutes, regulations, and case law across all 50 states.
      - name: District of Columbia
        description: Statutes, regulations, and case law for D.C.
      - name: Puerto Rico
        description: Statutes, regulations, and case law for Puerto Rico.
      - name: Volume
        description: 4,332,953+ Sections of law tracked under a unified data model.
    integrations:
      - name: Authoritative U.S. Government Law Sources
      - name: Bluebook Citation Format
      - name: RAG Pipelines
      - name: GRC / IRM Platforms
    authentication:
      - type: Bearer Token
        description: HTTP Bearer authentication using an API token issued by OpenLaws.
