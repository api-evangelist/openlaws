aid: openlaws
name: OpenLaws
description: >-
  OpenLaws is a Public Benefit Corporation that provides programmatic access
  to U.S. law text — federal and state statutes, regulations, constitutions,
  and case law — through a unified Legal Data API. The platform exposes
  keyword and citation search, hierarchical division retrieval, historical
  versions with redline comparisons, citation parsing and validation, and
  deep links to authoritative government sources. Coverage spans 53 U.S.
  jurisdictions (50 states + D.C. + Puerto Rico + Federal) with more than
  4.3 million law sections under a single data model, targeted at RegTech,
  LegalTech, GRC / IRM, generative AI / RAG, and legal research workloads.
