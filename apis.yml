aid: openlaws
name: OpenLaws
description: >-
  OpenLaws provides programmatic access to law data including statutes,
  regulations, and case law across U.S. jurisdictions. The API supports
  keyword and hybrid search, jurisdiction and court filtering, citation
  identification and validation, historical version queries with redline
  comparisons, and citation lookup with mapping to authoritative government
  sources.
